apiVersion: apps/v1
kind: Deployment
metadata:
  name: mamays-deployment
  labels:
    app: mamays
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mamays
  template:
    metadata:
      labels:
        app: mamays
    spec:
      containers:
      - name: mamays-app
        image: mamays-frontend:latest
        imagePullPolicy: Never # Útil para Minikube cuando usas imágenes locales
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mamays-service
spec:
  selector:
    app: mamays
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
